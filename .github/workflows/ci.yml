name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy-production:
    name: Deploy to Vercel production
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.clickexatas.com.br
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID_RAW: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          # Trim whitespace/newlines from secrets (common paste error)
          VERCEL_TOKEN_CLEAN=$(echo -n "$VERCEL_TOKEN_RAW" | tr -d '[:space:]')
          VERCEL_SCOPE_CLEAN=$(echo -n "$VERCEL_ORG_ID_RAW" | tr -d '[:space:]')
          vercel deploy \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN_CLEAN" \
            --scope="$VERCEL_SCOPE_CLEAN" \
            --cwd="$GITHUB_WORKSPACE"
